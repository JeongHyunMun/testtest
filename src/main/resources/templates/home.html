<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"  
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head>
<meta charset="UTF-8">
<title>Select Menu</title>
</head>
<body>
  <a href="/login">정보조회</a>
  <a sec:authorize="hasRole('ADMIN')" href="/login">adminOnly Page</a>
  <a sec:authorize="!isAuthenticated()" href="/login">Login</a>
  <a sec:authorize="isAuthenticated()" href="/login">Logout</a>
  <p sec:authorize="hasRole('ADMIN')">[이 부분은 운영자(ADMIN)에게만 나타남]</p>
  <p sec:authorize="hasRole('GUEST')">[이 부분은 손님(GUEST)에게만 나타남]</p>
  <p sec:authorize="isAuthenticated()" property="userVo" var="user">[이 부분은 로그인한 사용자(isAuthenticated) 모두에게 나타남] 
  {</p>
</body>
</html>
